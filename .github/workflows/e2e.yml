name: E2E

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hostel_management
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hostel_management"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare environment files
        run: |
          cp .env.example .env
          cat > deploy/.env.docker <<'EOF'
          DATABASE_URL=postgresql+psycopg://postgres:postgres@host.docker.internal:5432/hostel_management
          EOF

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt

      - name: Run database migrations
        run: |
          source .venv/bin/activate
          alembic upgrade head

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Python compile check
        run: |
          source .venv/bin/activate
          python -m compileall app backend worker

      - name: Start application stack
        run: docker compose -f deploy/docker-compose.yml up -d --build web api nginx

      - name: Wait for services
        run: |
          python - <<'PY'
          import time
          import urllib.request

          urls = [
              "http://127.0.0.1/login",
              "http://127.0.0.1/api/v1/health",
          ]

          for url in urls:
              for attempt in range(60):
                  try:
                      with urllib.request.urlopen(url, timeout=5) as response:
                          if response.status < 500:
                              break
                  except Exception:
                      time.sleep(2)
              else:
                  raise SystemExit(f"Timed out waiting for {url}")
          PY

      - name: Run Playwright E2E suite
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1
          E2E_ADMIN_USERNAME: e2e-admin@example.com
          E2E_ADMIN_PASSWORD: StrongPass1!
        run: npm run test:e2e

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs --no-color
